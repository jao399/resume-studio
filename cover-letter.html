<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <script src="./runtime-config.js"></script>
    <title>Resume Studio - English Cover Letter</title>
    <script>
      window.resumeDocumentMode = "cover-letter";
      (function () {
        const bust = Date.now();
        const style = document.createElement("link");
        style.rel = "stylesheet";
        style.href = "./styles.css?v=" + bust;
        document.head.appendChild(style);
      })();
    </script>
  </head>
  <body>
    <main id="resume" class="resume-shell" aria-label="Cover letter"></main>
    <script>
      (function () {
        const bust = Date.now();
        const params = new URLSearchParams(window.location.search);
        const override = params.get("override");
        const dataScript = override
          ? override + (override.indexOf("?") >= 0 ? "&" : "?") + "v=" + bust
          : "./resume-data.js?v=" + bust;
        const scripts = [dataScript, "./resume.js?v=" + bust];
        scripts.forEach(function (src) {
          const script = document.createElement("script");
          script.src = src;
          script.async = false;
          document.body.appendChild(script);
        });
      })();
    </script>
  </body>
</html>
