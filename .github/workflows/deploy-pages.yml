name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site/assets
          cp index.html _site/
          cp arabic.html _site/
          cp cover-letter.html _site/
          cp cover-letter-ar.html _site/
          cp print-en.html _site/
          cp print-ar.html _site/
          cp resume.js _site/
          cp resume-data.js _site/
          cp resume-data-ar.js _site/
          cp runtime-config.js _site/
          cp styles.css _site/
          cp .nojekyll _site/
          cp LICENSE _site/
          cp README.md _site/
          cp assets/* _site/assets/

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
